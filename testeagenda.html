<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Agenda</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif}
:root{
--bg:#F0F4F8;--surface:#FFFFFF;--text:#1E293B;--primary:#2563EB;--secondary:#64748B;
--urgent:#EF4444;--high:#FF8C42;--medium:#FBBF24;--low:#10B981;
}
.app-wrapper{height:100%;width:100%;overflow:auto;background:var(--bg);color:var(--text)}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);transition:all .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center}
.modal-content{background:var(--surface);border-radius:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:28px;display:flex;flex-direction:column}
@media(max-width:640px){.modal-content{border-radius:20px;max-height:85vh;width:calc(100% - 24px);margin:12px}}
input,textarea,select{border:1.5px solid #E2E8F0;border-radius:12px;padding:10px 14px;font-family:inherit;font-size:14px;width:100%;transition:border .2s;background:#F8FAFC}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);background:#fff}
.btn{border:none;border-radius:12px;padding:10px 20px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1D4ED8}
.btn-danger{background:#FEE2E2;color:var(--urgent)}
.btn-danger:hover{background:#FECACA}
.btn-ghost{background:transparent;color:var(--secondary)}
.btn-ghost:hover{background:#F1F5F9}
.tab-btn{padding:8px 16px;border-radius:10px;font-weight:600;font-size:13px;border:none;cursor:pointer;background:transparent;color:var(--secondary);transition:all .15s}
.tab-btn.active{background:var(--primary);color:#fff}
.toast{position:fixed;top:20px;right:20px;z-index:100;background:var(--surface);border-radius:14px;padding:14px 20px;box-shadow:0 8px 24px rgba(0,0,0,.12);display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
.cal-day{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:transparent;position:relative}
.cal-day:hover{background:#EFF6FF}
.cal-day.today{background:var(--primary);color:#fff;font-weight:700}
.cal-day.selected{outline:2px solid var(--primary);outline-offset:1px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--secondary);text-align:center}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <button onclick="openTaskModal()" id="fab-button" style="position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:var(--primary);color:#fff;border:none;box-shadow:0 4px 16px rgba(37,99,235,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;transition:all .2s" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'"><i data-lucide="plus" style="width:24px;height:24px"></i></button>
  <div class="app-wrapper" id="app">
   <div id="toast-container"></div>
   <header style="background:linear-gradient(135deg,#2563EB 0%,#3B82F6 50%,#60A5FA 100%);color:#fff;padding:20px 20px 60px;position:relative">
    <div style="max-width:600px;margin:0 auto">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="display:flex;flex-direction:column;gap:3px">
       <p style="font-size:13px;opacity:.8" id="greeting-text">Olá! Bem-vindo 👋</p>
       <h1 style="font-size:22px;font-weight:800;letter-spacing:-.3px" id="app-title">Minha Agenda</h1>
      </div>
      <div style="display:flex;gap:10px;align-items:center;position:relative"><button onclick="toggleNotifications()" style="background:rgba(255,255,255,.15);border:none;border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;position:relative;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.25)'" onmouseout="this.style.background='rgba(255,255,255,.15)'"><i data-lucide="bell" style="width:20px;height:20px"></i><span id="notification-badge" style="position:absolute;top:-4px;right:-4px;background:#FF6B6B;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;display:none"></span></button> <button onclick="toggleSettings()" style="background:rgba(255,255,255,.15);border:none;border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.25)'" onmouseout="this.style.background='rgba(255,255,255,.15)'"><i data-lucide="settings" style="width:20px;height:20px"></i></button>
      </div>
     </div>
     <div style="display:flex;gap:6px;align-items:center;font-size:14px;opacity:.9">
      <i data-lucide="calendar" style="width:16px;height:16px"></i> <span id="header-date"></span> <span style="opacity:.6">•</span> <span id="header-time"></span>
     </div>
    </div>
   </header>
   <div style="max-width:600px;margin:16px auto 0;padding:0 16px">
    <div style="display:flex;gap:6px;background:var(--surface);border-radius:14px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.05)">
     <button class="tab-btn active" onclick="switchTab('tasks')" id="tab-tasks">Tarefas</button> <button class="tab-btn" onclick="switchTab('calendar')" id="tab-calendar">Calendário</button>
    </div>
   </div>
   <div id="view-tasks" style="max-width:600px;margin:12px auto 100px;padding:0 16px">
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">
     <button onclick="changeTaskDate(-1)" class="btn btn-ghost" style="padding:8px"><i data-lucide="chevron-left" style="width:18px;height:18px"></i></button>
     <div style="flex:1;text-align:center;font-weight:700;font-size:14px" id="tasks-date-label">
      Hoje
     </div><button onclick="changeTaskDate(1)" class="btn btn-ghost" style="padding:8px"><i data-lucide="chevron-right" style="width:18px;height:18px"></i></button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding:4px 0;scroll-behavior:smooth;-webkit-overflow-scrolling:touch">
     <button class="tab-btn active" onclick="filterTasks('all')" data-filter="all" style="font-size:12px;white-space:nowrap">Todas</button> <button class="tab-btn" onclick="filterTasks('pending')" data-filter="pending" style="font-size:12px;white-space:nowrap">Pendentes</button> <button class="tab-btn" onclick="filterTasks('done')" data-filter="done" style="font-size:12px;white-space:nowrap">Concluídas</button> <button class="tab-btn" onclick="filterTasks('urgent')" data-filter="urgent" style="font-size:12px;white-space:nowrap;background:rgba(239,68,68,.1);color:#EF4444">Urgentes</button> <button class="tab-btn" onclick="filterTasks('high')" data-filter="high" style="font-size:12px;white-space:nowrap;background:rgba(255,140,66,.1);color:#FF8C42">Alta</button> <button class="tab-btn" onclick="filterTasks('medium')" data-filter="medium" style="font-size:12px;white-space:nowrap;background:rgba(245,158,11,.1);color:#F59E0B">Média</button> <button class="tab-btn" onclick="filterTasks('low')" data-filter="low" style="font-size:12px;white-space:nowrap;background:rgba(16,185,129,.1);color:#10B981">Baixa</button>
    </div>
    <div id="tasks-list"></div>
   </div>
   <div id="view-calendar" style="max-width:600px;margin:12px auto 100px;padding:0 16px;display:none">
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">
     <button onclick="changeTaskDate(-1)" class="btn btn-ghost" style="padding:8px"><i data-lucide="chevron-left" style="width:18px;height:18px"></i></button>
     <div style="flex:1;text-align:center;font-weight:700;font-size:14px" id="cal-date-label">
      Hoje
     </div><button onclick="changeTaskDate(1)" class="btn btn-ghost" style="padding:8px"><i data-lucide="chevron-right" style="width:18px;height:18px"></i></button>
    </div>
    <div class="card" style="padding:20px;margin-bottom:16px">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="changeMonth(-1)" class="btn btn-ghost" style="padding:8px"><i data-lucide="chevron-left" style="width:18px;height:18px"></i></button>
      <h3 style="font-weight:700;font-size:16px" id="cal-month-label"></h3><button onclick="changeMonth(1)" class="btn btn-ghost" style="padding:8px"><i data-lucide="chevron-right" style="width:18px;height:18px"></i></button>
     </div>
     <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:8px">
      <span style="font-size:11px;font-weight:600;color:var(--secondary);padding:8px 4px">Dom</span> <span style="font-size:11px;font-weight:600;color:var(--secondary);padding:8px 4px">Seg</span> <span style="font-size:11px;font-weight:600;color:var(--secondary);padding:8px 4px">Ter</span> <span style="font-size:11px;font-weight:600;color:var(--secondary);padding:8px 4px">Qua</span> <span style="font-size:11px;font-weight:600;color:var(--secondary);padding:8px 4px">Qui</span> <span style="font-size:11px;font-weight:600;color:var(--secondary);padding:8px 4px">Sex</span> <span style="font-size:11px;font-weight:600;color:var(--secondary);padding:8px 4px">Sáb</span>
     </div>
     <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div>
    </div>
    <h3 style="font-weight:700;font-size:15px;margin-bottom:10px" id="cal-day-label">Tarefas do dia</h3>
    <div id="cal-tasks-list"></div>
   </div>
   <div id="settings-panel" style="display:none;position:fixed;top:0;right:0;bottom:0;width:100%;max-width:360px;background:var(--surface);z-index:60;box-shadow:-4px 0 24px rgba(0,0,0,.1);overflow:auto" class="slide-up">
    <div style="padding:20px">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-weight:800;font-size:18px">Configurações</h2><button onclick="toggleSettings()" class="btn btn-ghost" style="padding:8px"><i data-lucide="x" style="width:20px;height:20px"></i></button>
     </div>
     <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #F1F5F9">
      <p style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:8px">Editar nome</p>
      <div style="display:flex;gap:8px">
       <input type="text" id="settings-name-input" placeholder="Digite seu nome" style="border:1.5px solid #E2E8F0;border-radius:12px;padding:10px 14px;font-family:inherit;font-size:14px;flex:1;background:var(--surface);color:var(--text)"> <button onclick="updateUserName()" class="btn btn-primary" style="padding:10px 16px"><i data-lucide="pencil" style="width:16px;height:16px"></i></button>
      </div>
     </div>
     <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #F1F5F9">
      <p style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:12px">Tema</p>
      <div style="display:flex;gap:8px">
       <button onclick="setTheme('light')" id="theme-light" class="btn" style="flex:1;justify-content:center;border:2px solid #E2E8F0;background:transparent;color:var(--secondary)"><i data-lucide="sun" style="width:16px;height:16px"></i> Claro</button> <button onclick="setTheme('dark')" id="theme-dark" class="btn" style="flex:1;justify-content:center;border:2px solid #E2E8F0;background:transparent;color:var(--secondary)"><i data-lucide="moon" style="width:16px;height:16px"></i> Escuro</button>
      </div>
     </div>
     <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #F1F5F9">
      <p style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:10px">Dados</p>
      <div style="display:flex;flex-direction:column;gap:8px">
       <button onclick="exportTasks()" class="btn btn-ghost" style="width:100%;justify-content:center;border:1.5px solid #E2E8F0;font-size:12px;border-radius:12px"><i data-lucide="download" style="width:14px;height:14px"></i> Exportar</button> <button onclick="importTasks()" class="btn btn-ghost" style="width:100%;justify-content:center;border:1.5px solid #E2E8F0;font-size:12px;border-radius:12px"><i data-lucide="upload" style="width:14px;height:14px"></i> Importar</button> <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImportFile(event)">
      </div>
     </div>
     <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #F1F5F9">
      <p style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:10px">Limpeza</p><button onclick="requestClearAll()" class="btn" style="width:100%;justify-content:center;border:1.5px solid #FEE2E2;background:#FEE2E2;color:var(--urgent);border-radius:12px;font-size:12px;font-weight:600"><i data-lucide="trash" style="width:14px;height:14px"></i> Limpar Tudo</button>
     </div>
     <div>
      <p style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:10px">Histórico de notificações</p><button onclick="clearAllNotifications()" class="btn" style="width:100%;justify-content:center;border:1.5px solid #E2E8F0;background:transparent;color:var(--secondary);border-radius:12px;font-size:12px;font-weight:600"><i data-lucide="trash-2" style="width:14px;height:14px"></i> Limpar Notificações</button>
     </div>
    </div>
   </div>
   <div id="settings-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:55" onclick="toggleSettings()"></div>
   <div id="notifications-panel" style="display:none;position:fixed;top:0;right:0;bottom:0;width:100%;max-width:360px;background:var(--surface);z-index:65;box-shadow:-4px 0 24px rgba(0,0,0,.1);overflow:auto" class="slide-up">
    <div style="padding:20px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:10">
     <h2 style="font-weight:800;font-size:18px">Notificações</h2><button onclick="toggleNotifications()" class="btn btn-ghost" style="padding:8px"><i data-lucide="x" style="width:20px;height:20px"></i></button>
    </div>
    <div id="notifications-list" style="padding:20px;display:flex;flex-direction:column;gap:12px"></div>
   </div>
   <div id="notifications-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:60" onclick="toggleNotifications()"></div>
   <div id="delete-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeDeleteModal()">
    <div class="modal-content slide-up" style="max-width:380px;text-align:center">
     <div style="width:56px;height:56px;border-radius:16px;background:#FEE2E2;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <i data-lucide="trash-2" style="width:24px;height:24px;color:var(--urgent)"></i>
     </div>
     <h3 style="font-weight:700;font-size:17px;margin-bottom:8px">Excluir tarefa?</h3>
     <p style="font-size:13px;color:var(--secondary);margin-bottom:20px" id="delete-task-name"></p>
     <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="closeDeleteModal()" class="btn btn-ghost" style="border-radius:14px">Cancelar</button> <button onclick="confirmDelete()" class="btn btn-danger" style="border-radius:14px"><i data-lucide="trash-2" style="width:14px;height:14px"></i> Excluir</button>
     </div>
    </div>
   </div>
   <div id="complete-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeCompleteModal()">
    <div class="modal-content slide-up" style="max-width:380px;text-align:center">
     <div style="width:56px;height:56px;border-radius:16px;background:#D1FAE5;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <i data-lucide="check-circle" style="width:24px;height:24px;color:var(--low)"></i>
     </div>
     <h3 style="font-weight:700;font-size:17px;margin-bottom:8px" id="complete-modal-title">Concluir tarefa?</h3>
     <p style="font-size:13px;color:var(--secondary);margin-bottom:20px" id="complete-task-name"></p>
     <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="closeCompleteModal()" class="btn btn-ghost" style="border-radius:14px">Cancelar</button> <button onclick="confirmComplete()" class="btn btn-primary" style="border-radius:14px"><i data-lucide="check" style="width:14px;height:14px"></i> Confirmar</button>
     </div>
    </div>
   </div>
   <div id="task-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeTaskModal()">
    <div class="modal-content slide-up">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-weight:800;font-size:18px" id="modal-title">Nova Tarefa</h2><button onclick="closeTaskModal()" class="btn btn-ghost" style="padding:8px"><i data-lucide="x" style="width:20px;height:20px"></i></button>
     </div>
     <form id="task-form" onsubmit="event.preventDefault(); submitForm();">
      <input type="hidden" id="task-id">
      <div style="display:flex;flex-direction:column;gap:14px">
       <div>
        <label style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:4px;display:block">Título *</label> <input type="text" id="f-title" required placeholder="Nome da tarefa">
       </div>
       <div>
        <label style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:4px;display:block">Descrição</label> <textarea id="f-desc" rows="2" placeholder="Detalhes da tarefa" style="resize:vertical"></textarea>
       </div>
       <div>
        <label style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:4px;display:block">Data *</label> <input type="date" id="f-date" required>
       </div>
       <div>
        <label style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:4px;display:block">Horário</label> <input type="time" id="f-time">
       </div>
       <div>
        <label style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:8px;display:block">Prioridade</label>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px" id="priority-buttons">
         <button type="button" onclick="setPriority('low')" class="priority-btn" data-priority="low" style="display:flex;align-items:center;gap:8px;padding:12px;border:2px solid #E2E8F0;border-radius:12px;background:transparent;cursor:pointer;transition:all .2s;font-weight:600;font-size:13px">
          <div style="width:12px;height:12px;border-radius:50%;background:var(--low)"></div> Baixa </button> <button type="button" onclick="setPriority('medium')" class="priority-btn" data-priority="medium" style="display:flex;align-items:center;gap:8px;padding:12px;border:2px solid #E2E8F0;border-radius:12px;background:transparent;cursor:pointer;transition:all .2s;font-weight:600;font-size:13px">
          <div style="width:12px;height:12px;background:var(--medium);clip-path:polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)"></div> Média </button> <button type="button" onclick="setPriority('high')" class="priority-btn" data-priority="high" style="display:flex;align-items:center;gap:8px;padding:12px;border:2px solid #E2E8F0;border-radius:12px;background:transparent;cursor:pointer;transition:all .2s;font-weight:600;font-size:13px">
          <div style="width:12px;height:12px;background:var(--high)"></div> Alta </button> <button type="button" onclick="setPriority('urgent')" class="priority-btn" data-priority="urgent" style="display:flex;align-items:center;gap:8px;padding:12px;border:2px solid #E2E8F0;border-radius:12px;background:transparent;cursor:pointer;transition:all .2s;font-weight:600;font-size:13px">
          <div style="width:12px;height:12px;border-radius:50%;background:var(--urgent)"></div> Urgente </button>
        </div><input type="hidden" id="f-priority" value="low">
       </div>
       <div>
        <label style="font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:4px;display:block">Observações</label> <textarea id="f-notes" rows="2" placeholder="Notas adicionais..." style="resize:vertical"></textarea>
       </div>
       <div id="form-actions" style="display:flex;gap:10px;justify-content:flex-end">
        <button type="button" onclick="closeTaskModal()" class="btn btn-ghost">Cancelar</button> <button type="submit" class="btn btn-primary" id="save-btn"><i data-lucide="check" style="width:16px;height:16px"></i> Salvar</button>
       </div>
      </div>
     </form>
    </div>
   </div>
  </div>
  <script>
// ===== STATE =====
let tasks = JSON.parse(localStorage.getItem('agenda_tasks') || '[]');
let notifications = JSON.parse(localStorage.getItem('agenda_notifications') || '[]');
let userName = localStorage.getItem('user_name') || '';
let currentTheme = localStorage.getItem('user_theme') || 'light';
let currentFilter = 'all';
let currentTab = 'tasks';
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let selectedCalDate = null;
let selectedTaskDate = null;
let deleteTargetId = null;
let completeTargetId = null;
let editingId = null;

const PRIORITY_COLORS = { urgent:'#EF4444', high:'#FF8C42', medium:'#FBBF24', low:'#10B981' };
const PRIORITY_LABELS = { urgent:'Urgente', high:'Alta', medium:'Média', low:'Baixa' };
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function save() {
  localStorage.setItem('agenda_tasks', JSON.stringify(tasks));
  localStorage.setItem('agenda_notifications', JSON.stringify(notifications));
}

function addNotification(type, message) {
  const notification = {
    id: 'notif_' + Date.now(),
    type: type,
    message: message,
    timestamp: new Date().toISOString(),
    read: false
  };
  notifications.unshift(notification);
  if (notifications.length > 50) notifications.pop();
  save();
  updateNotificationBadge();
}

async function getTodayFromAPI() {
  try {
    const response = await fetch('https://worldtimeapi.org/api/timezone/America/Sao_Paulo');
    const data = await response.json();
    const correctDate = data.datetime.split('T')[0];
    localStorage.setItem('today_cache', correctDate);
    localStorage.setItem('today_cache_time', Date.now());
    return correctDate;
  } catch (e) {
    const fallback = new Date().toISOString().split('T')[0];
    localStorage.setItem('today_cache', fallback);
    return fallback;
  }
}

function todayStr() { 
  const stored = localStorage.getItem('today_cache');
  const cacheTime = localStorage.getItem('today_cache_time');
  if (stored && cacheTime && (Date.now() - parseInt(cacheTime)) < 3600000) return stored;
  getTodayFromAPI();
  return stored || new Date().toISOString().split('T')[0];
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function getBrasiliaTime() {
  const formatter = new Intl.DateTimeFormat('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  return formatter.format(new Date());
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia! ☀️';
  if (h < 18) return 'Boa tarde! 🌤️';
  return 'Boa noite! 🌙';
}

// ===== TOAST =====
function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const colors = { success:'#10B981', error:'#EF4444', info:'#2563EB' };
  const icons = { success:'check-circle', error:'alert-circle', info:'info' };
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<i data-lucide="${icons[type]}" style="width:18px;height:18px;color:${colors[type]}"></i><span>${msg}</span>`;
  c.appendChild(t);
  lucide.createIcons();
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100px)'; t.style.transition='all .3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ===== SETTINGS =====
function toggleSettings(event) {
  if (event && event.target.id === 'settings-overlay') return;
  const p = document.getElementById('settings-panel');
  const o = document.getElementById('settings-overlay');
  const show = p.style.display === 'none';
  p.style.display = show ? 'block' : 'none';
  if (o) o.style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('settings-name-input').value = userName;
    updateThemeButtons();
  }
  updateFabVisibility();
}

// ===== NOTIFICATIONS =====
function updateNotificationBadge() {
  const unread = notifications.filter(n => !n.read).length;
  const badge = document.getElementById('notification-badge');
  if (unread > 0) {
    badge.textContent = unread > 9 ? '9+' : unread;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function toggleNotifications(event) {
  if (event && event.target.id === 'notifications-overlay') return;
  const p = document.getElementById('notifications-panel');
  const o = document.getElementById('notifications-overlay');
  const show = p.style.display === 'none';
  p.style.display = show ? 'block' : 'none';
  if (o) o.style.display = show ? 'block' : 'none';
  if (show) {
    renderNotifications();
    notifications.forEach(n => n.read = true);
    save();
    updateNotificationBadge();
  }
  updateFabVisibility();
}

function renderNotifications() {
  const list = document.getElementById('notifications-list');
  if (notifications.length === 0) {
    list.innerHTML = `<div class="empty-state"><div style="width:48px;height:48px;border-radius:16px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;margin-bottom:12px"><i data-lucide="bell-off" style="width:20px;height:20px;color:var(--primary)"></i></div><p style="font-weight:600;font-size:14px;color:var(--text)">Sem notificações</p><p style="font-size:12px;color:var(--secondary)">Voltaremos em breve</p></div>`;
    lucide.createIcons();
    return;
  }
  list.innerHTML = notifications.map(n => {
    const date = new Date(n.timestamp);
    const now = new Date();
    let timeStr = '';
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    
    if (diffMins < 1) timeStr = 'Agora';
    else if (diffMins < 60) timeStr = `${diffMins}min`;
    else if (diffHours < 24) timeStr = `${diffHours}h`;
    else if (diffDays < 7) timeStr = `${diffDays}d`;
    else timeStr = date.toLocaleDateString('pt-BR');

    const icons = {
      'create': 'plus-circle',
      'update': 'edit',
      'delete': 'trash-2',
      'complete': 'check-circle',
      'uncomplete': 'rotate-ccw'
    };
    const colors = {
      'create': '#10B981',
      'update': '#2563EB',
      'delete': '#EF4444',
      'complete': '#10B981',
      'uncomplete': '#2563EB'
    };

    return `<div class="card fade-in" style="padding:12px;border-left:3px solid ${colors[n.type] || '#2563EB'};background:var(--surface)">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="width:36px;height:36px;border-radius:10px;background:${colors[n.type]}15;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i data-lucide="${icons[n.type] || 'info'}" style="width:18px;height:18px;color:${colors[n.type] || '#2563EB'}"></i>
        </div>
        <div style="flex:1;min-width:0">
          <p style="font-size:13px;font-weight:600;color:var(--text);word-break:break-word">${n.message}</p>
          <p style="font-size:11px;color:var(--secondary);margin-top:4px">${timeStr}</p>
        </div>
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

function clearAllNotifications() {
  notifications = [];
  save();
  updateNotificationBadge();

  const panelOpen = document.getElementById('notifications-panel').style.display === 'block';
  if (panelOpen) {
    renderNotifications();

  localStorage.setItem('user_theme', theme);

  updateThemeButtons();

function updateThemeButtons() {
  const isDark = currentTheme === 'dark';
  document.getElementById('theme-light').style.borderColor = isDark ? '#E2E8F0' : 'var(--primary)';
  document.getElementById('theme-light').style.color = isDark ? 'var(--secondary)' : 'var(--primary)';

  document.getElementById('theme-dark').style.borderColor = isDark ? 'var(--primary)' : '#E2E8F0';

  document.getElementById('theme-dark').style.background = isDark ? 'var(--primary)18' : 'transparent';

function applyTheme() {
  if (currentTheme === 'dark') {
    document.documentElement.style.setProperty('--bg', '#0F172A');
    document.documentElement.style.setProperty('--surface', '#1E293B');
    document.documentElement.style.setProperty('--text', '#F1F5F9');
    document.documentElement.style.setProperty('--secondary', '#94A3B8');
  } else {
    document.documentElement.style.setProperty('--bg', '#F0F4F8');
    document.documentElement.style.setProperty('--surface', '#FFFFFF');
    document.documentElement.style.setProperty('--text', '#1E293B');
    document.documentElement.style.setProperty('--secondary', '#64748B');
  }
}

function exportTasks() {
  const data = { exportDate: new Date().toISOString(), tasks, userName, version: '1.0' };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tarefas_agenda_${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Tarefas exportadas com sucesso!');
}

function importTasks() {
  document.getElementById('import-file').click();
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.tasks || !Array.isArray(data.tasks)) { showToast('Arquivo inválido!', 'error'); return; }
      tasks = [...tasks, ...data.tasks];
      save();
      renderAll();
      showToast(`${data.tasks.length} tarefas importadas!`);
    } catch (err) {
      showToast('Erro ao ler arquivo!', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== RENDER TASKS =====
function renderTasks(targetTasks, container) {
  const list = container || document.getElementById('tasks-list');
  let filtered = targetTasks || tasks;
  const today = todayStr();
  const displayDate = selectedTaskDate || today;

  if (!targetTasks) {
    if (currentFilter === 'pending') filtered = tasks.filter(t => t.date === displayDate && t.status !== 'done');
    else if (currentFilter === 'done') filtered = tasks.filter(t => t.date === displayDate && t.status === 'done');
    else if (currentFilter === 'urgent') filtered = tasks.filter(t => t.date === displayDate && t.priority === 'urgent');
    else if (currentFilter === 'high') filtered = tasks.filter(t => t.date === displayDate && t.priority === 'high');
    else if (currentFilter === 'medium') filtered = tasks.filter(t => t.date === displayDate && t.priority === 'medium');
    else if (currentFilter === 'low') filtered = tasks.filter(t => t.date === displayDate && t.priority === 'low');
    else filtered = tasks.filter(t => t.date === displayDate);
  }

  filtered.sort((a, b) => {
    const aHasTime = a.time && a.time.trim();
    const bHasTime = b.time && b.time.trim();
    if (aHasTime && !bHasTime) return -1;
    if (!aHasTime && bHasTime) return 1;
    if (aHasTime && bHasTime) return a.time.localeCompare(b.time);
    return 0;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state fade-in"><div style="width:64px;height:64px;border-radius:20px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;margin-bottom:12px"><i data-lucide="clipboard-list" style="width:28px;height:28px;color:var(--primary)"></i></div><p style="font-weight:600;font-size:15px;margin-bottom:4px">Nenhuma tarefa</p><p style="font-size:13px">Toque no + para adicionar</p></div>`;
    lucide.createIcons();
    return;
  }

  list.innerHTML = filtered.map(t => {
    const pc = PRIORITY_COLORS[t.priority] || '#64748B';
    const isDone = t.status === 'done';
    const [y, m, d] = t.date.split('-');
    const dateFormatted = `${d}/${m}`;
    const priorityLabel = PRIORITY_LABELS[t.priority] || 'Normal';
    let timeDisplay = '--:--';
    if (t.time && t.time.trim()) timeDisplay = t.time;
    
    return `<div class="card fade-in" style="display:grid;grid-template-columns:80px 1fr auto;gap:12px;padding:16px;border-left:4px solid ${pc};${isDone?'background:#F8FAFC':'background:var(--surface)'};cursor:pointer;user-select:none;transition:all .2s;align-items:start">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;background:${pc}08;border-radius:12px;min-height:80px;gap:2px;${isDone?'opacity:.6':''}">
        ${t.time?`<div style="font-size:28px;font-weight:800;color:${pc};line-height:1.1;letter-spacing:-0.5px">${t.time.split(':')[0]}<span style="font-size:28px">:${t.time.split(':')[1]}</span></div>`:`<div style="font-size:11px;color:var(--secondary)">sem hora</div>`}
        <div style="font-size:12px;color:var(--text);font-weight:900;margin-top:2px">${dateFormatted}</div>
        <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:${pc}18;color:${pc};margin-top:4px">${PRIORITY_LABELS[t.priority]}</span>
      </div>
      
      <div style="display:flex;flex-direction:column;justify-content:flex-start;min-width:0;flex:1">
        <h4 style="font-weight:700;font-size:15px;${isDone?'text-decoration:line-through;color:#94A3B8':'color:var(--text)'};word-break:break-word;margin-bottom:4px">${t.title}</h4>
        ${t.description?`<p style="font-size:12px;color:${isDone?'#94A3B8':'var(--secondary)'};word-break:break-word;${isDone?'text-decoration:line-through':''}">${t.description}</p>`:''}
      </div>

      <div style="display:flex;flex-direction:column;gap:4px;min-width:fit-content">
        <button onclick="openTaskModal('${t.id}')" class="btn btn-ghost" style="padding:6px 8px;border-radius:8px">
          <i data-lucide="pencil" style="width:16px;height:16px"></i>
        </button>
        <button onclick="requestDelete('${t.id}')" class="btn btn-ghost" style="padding:6px 8px;border-radius:8px;color:var(--urgent)">
          <i data-lucide="trash-2" style="width:16px;height:16px"></i>
        </button>
        ${!isDone
          ? `<button onclick="requestComplete('${t.id}')" class="btn btn-ghost" style="padding:6px 8px;font-size:12px;border-radius:8px;background:#10B981;color:#fff;font-weight:700;white-space:nowrap">
               <i data-lucide="check" style="width:14px;height:14px"></i>
             </button>`
          : `<button onclick="requestUncomplete('${t.id}')" class="btn btn-ghost" style="padding:6px 8px;font-size:12px;border-radius:8px;background:var(--primary);color:#fff;font-weight:700;white-space:nowrap">
               <i data-lucide="rotate-ccw" style="width:14px;height:14px"></i>
             </button>`
        }
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

// ===== FILTERS =====
function filterTasks(f) {
  currentFilter = f;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderTasks();
}

function changeTaskDate(days) {
  const today = todayStr();
  if (!selectedTaskDate) selectedTaskDate = today;
  const date = new Date(selectedTaskDate + 'T00:00:00');
  date.setDate(date.getDate() + days);
  selectedTaskDate = date.toISOString().split('T')[0];
  const [year, month, day] = selectedTaskDate.split('-');
  calYear = parseInt(year);
  calMonth = parseInt(month) - 1;
  selectedCalDate = selectedTaskDate;
  if (currentTab === 'tasks') renderTasks();
  else if (currentTab === 'calendar') renderCalendar();
  updateTaskDateLabel();
}

function updateTaskDateLabel() {
  const displayDate = selectedTaskDate || todayStr();
  const dateObj = new Date(displayDate + 'T00:00:00');
  const formatted = dateObj.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  const label = formatted.charAt(0).toUpperCase() + formatted.slice(1);
  document.getElementById('tasks-date-label').textContent = label;
  document.getElementById('cal-date-label').textContent = label;
}

function updateFabVisibility() {
  const fab = document.getElementById('fab-button');
  const settingsOpen = document.getElementById('settings-panel').style.display === 'block';
  const notificationsOpen = document.getElementById('notifications-panel').style.display === 'block';
  const isMainView = currentTab === 'tasks' || currentTab === 'calendar';

  fab.style.display = (isMainView && !settingsOpen && !notificationsOpen) ? 'flex' : 'none';
}

// ===== TABS =====
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-tasks').classList.toggle('active', tab === 'tasks');
  document.getElementById('tab-calendar').classList.toggle('active', tab === 'calendar');
  document.getElementById('view-tasks').style.display = tab === 'tasks' ? 'block' : 'none';
  document.getElementById('view-calendar').style.display = tab === 'calendar' ? 'block' : 'none';
  if (tab === 'calendar') renderCalendar();
  updateFabVisibility();
}

// ===== CALENDAR =====
function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = todayStr();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const isSel = dateStr === selectedCalDate;
    const hasTasks = tasks.some(t => t.date === dateStr);
    html += `<button class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectCalDate('${dateStr}')">${d}${hasTasks?'<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:'+(isToday?'#fff':'var(--primary)')+'"></span>':''}</button>`;
  }
  grid.innerHTML = html;
  const selDate = selectedCalDate || today;
  document.getElementById('cal-day-label').textContent = `Tarefas — ${new Date(selDate+'T00:00:00').toLocaleDateString('pt-BR',{day:'numeric',month:'long'})}`;
  const dayTasks = tasks.filter(t => t.date === selDate);
  renderTasks(dayTasks, document.getElementById('cal-tasks-list'));
}

function selectCalDate(d) { selectedTaskDate = d; selectedCalDate = d; updateTaskDateLabel(); renderCalendar(); }
function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

// ===== TASK MODAL =====
function openTaskModal(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Editar Tarefa' : 'Nova Tarefa';
  document.getElementById('save-btn').innerHTML = '<i data-lucide="check" style="width:16px;height:16px"></i> ' + (id ? 'Atualizar' : 'Salvar');
  if (id) {
    const t = tasks.find(x => x.id === id);
    if (t) {
      document.getElementById('f-title').value = t.title;
      document.getElementById('f-desc').value = t.description || '';
      document.getElementById('f-date').value = t.date;
      document.getElementById('f-time').value = t.time || '';
      document.getElementById('f-priority').value = t.priority;
      document.getElementById('f-notes').value = t.notes || '';
      updatePriorityButtons(t.priority);
    }
  } else {
    document.getElementById('task-form').reset();
    document.getElementById('f-date').value = selectedCalDate || todayStr();
    document.getElementById('f-priority').value = 'low';
    updatePriorityButtons('low');
  }
  document.getElementById('task-modal').style.display = 'flex';
  lucide.createIcons();
}

function setPriority(priority) {
  document.getElementById('f-priority').value = priority;
  updatePriorityButtons(priority);
}

function updatePriorityButtons(priority) {
  document.querySelectorAll('.priority-btn').forEach(btn => {
    const btnPriority = btn.dataset.priority;
    const isSelected = btnPriority === priority;
    btn.style.borderColor = isSelected ? `var(--${priority})` : '#E2E8F0';
    btn.style.background = isSelected ? `var(--${priority})15` : 'transparent';
    btn.style.color = isSelected ? `var(--${priority})` : 'var(--text)';
  });
}

function closeTaskModal() {
  document.getElementById('task-modal').style.display = 'none';
  editingId = null;
}

function submitForm() {
  const titleVal = document.getElementById('f-title').value.trim();
  const descVal = document.getElementById('f-desc').value.trim();
  const dateVal = document.getElementById('f-date').value;
  const timeVal = document.getElementById('f-time').value;
  const priorityVal = document.getElementById('f-priority').value;
  const notesVal = document.getElementById('f-notes').value.trim();

  if (!titleVal || !dateVal) {
    showToast('Preencha título e data!', 'error');
    return;
  }

  const data = { title: titleVal, description: descVal, date: dateVal, time: timeVal, priority: priorityVal, notes: notesVal };

  if (editingId) {
    const idx = tasks.findIndex(t => t.id === editingId);
    if (idx > -1) {
      tasks[idx] = { ...tasks[idx], ...data };
      addNotification('update', `Tarefa "${titleVal}" foi atualizada`);
    }
  } else {
    const newTask = { id: 'task_' + Date.now(), ...data, status: 'pending', createdAt: new Date().toISOString() };
    tasks.push(newTask);
    addNotification('create', `Nova tarefa "${titleVal}" criada`);
  }

  save();
  closeTaskModal();
  renderAll();
}

// ===== DELETE =====
function requestDelete(id) {
  deleteTargetId = id;
  const t = tasks.find(x => x.id === id);
  document.getElementById('delete-task-name').textContent = t ? `"${t.title}"` : '';
  document.getElementById('delete-modal').style.display = 'flex';
  lucide.createIcons();
}

function closeDeleteModal() { 
  document.getElementById('delete-modal').style.display = 'none'; 
  deleteTargetId = null; 
}

function confirmDelete() {
  if (!deleteTargetId) return;
  const task = tasks.find(t => t.id === deleteTargetId);
  tasks = tasks.filter(x => x.id !== deleteTargetId);
  if (task) addNotification('delete', `Tarefa "${task.title}" foi deletada`);
  save();
  closeDeleteModal();
  showToast('Tarefa excluída', 'error');
  renderAll();
}

// ===== COMPLETE =====
function requestComplete(id) {
  completeTargetId = id;
  const t = tasks.find(x => x.id === id);
  document.getElementById('complete-task-name').textContent = t ? `"${t.title}"` : '';
  document.getElementById('complete-modal-title').textContent = 'Concluir tarefa?';
  document.getElementById('complete-modal').style.display = 'flex';
  lucide.createIcons();
}

function requestUncomplete(id) {
  completeTargetId = id;
  const t = tasks.find(x => x.id === id);
  document.getElementById('complete-task-name').textContent = t ? `Reabrir "${t.title}"?` : '';
  document.getElementById('complete-modal-title').textContent = 'Reabrir tarefa?';
  document.getElementById('complete-modal').style.display = 'flex';
  lucide.createIcons();
}

function closeCompleteModal() { 
  document.getElementById('complete-modal').style.display = 'none'; 
  completeTargetId = null; 
}

function confirmComplete() {
  if (!completeTargetId) return;
  const t = tasks.find(x => x.id === completeTargetId);
  if (t) {
    t.status = t.status === 'done' ? 'pending' : 'done';
    const action = t.status === 'done' ? 'concluída' : 'reaberta';
    const notifType = t.status === 'done' ? 'complete' : 'uncomplete';
    addNotification(notifType, `Tarefa "${t.title}" foi ${action}`);
    showToast(`Tarefa ${action}!`);
  }
  save();
  closeCompleteModal();
  renderAll();
}

// ===== RENDER ALL =====
function renderAll() {
  renderHeader();
  updateTaskDateLabel();
  if (currentTab === 'tasks') renderTasks();
  if (currentTab === 'calendar') renderCalendar();
}

// ===== INIT =====
function initApp() {
  applyTheme();
  getTodayFromAPI().then(() => {
    renderAll();
    updateNotificationBadge();
    lucide.createIcons();
    updateFabVisibility();
  });
}

initApp();
